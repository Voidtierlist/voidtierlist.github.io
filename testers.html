<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Void Tierlist - Testers</title>
<link rel="stylesheet" href="/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="page testers-page">
    <div class="topbar">
        <div class="logo">
            <img src="https://ik.imagekit.io/tb4zlfjcb/voidtierlist%20logo.png" alt="Void Tierlist logo">
        </div>

        <div class="nav-links">
            <a href="/" class="nav-link">
                <img src="https://mctiers.com/nav_icons/home-muted.svg" alt="Home icon" aria-hidden="true">
                <span>Home</span>
            </a>
            <a href="/rankings" class="nav-link">
                <img src="https://mctiers.com/nav_icons/rankings.svg" alt="Rankings icon" aria-hidden="true">
                <span>Rankings</span>
            </a>
            <a href="https://dc.gg/voidtierlist" target="_blank" rel="noopener noreferrer" class="nav-link">
                <img src="https://mctiers.com/nav_icons/discord.svg" alt="Discord icon" aria-hidden="true">
                <span>Discord</span>
            </a>
            <a href="/testers" class="nav-link active">
                <img src="https://ik.imagekit.io/e8lpkrj4i/icons8-bar-chart-100.png" alt="Testers icon" aria-hidden="true">
                <span>Testers</span>
            </a>
        </div>

        <button id="mobileMenuToggle" class="mobile-menu-toggle" type="button" aria-expanded="false" aria-controls="mobileNav" aria-label="Open navigation menu">☰</button>

        <div class="nav-right">
            <div class="search-wrapper">
                <img src="https://ik.imagekit.io/e8lpkrj4i/search-13-512.png" alt="Search" aria-hidden="true" class="search-icon">
                <input type="text" id="testerSearchInput" placeholder="Search testers...">
            </div>
        </div>
    </div>

    <div id="mobileNavBackdrop" class="mobile-nav-backdrop" hidden></div>
    <nav id="mobileNav" class="mobile-nav-drawer" aria-hidden="true">
        <button id="mobileNavClose" class="mobile-nav-close" type="button" aria-label="Close navigation menu">✕</button>
        <a href="/">Home</a>
        <a href="/rankings">Rankings</a>
        <a href="https://dc.gg/voidtierlist" target="_blank" rel="noopener noreferrer">Discord</a>
        <a href="/testers" class="active">Testers</a>
    </nav>

    <section class="testers-header">
        <h1><img src="https://ik.imagekit.io/e8lpkrj4i/icons8-bar-chart-100.png" alt="" aria-hidden="true" class="testers-title-icon">Testers</h1>
        <div class="testers-stats">
            <div class="status-pill"><span class="dot online"></span><span id="onlineCount">0 Online</span></div>
            <div class="status-pill">Total: <strong id="totalCount">0</strong></div>
        </div>
    </section>

    <div class="divider-line"></div>

    <section id="testersGrid" class="testers-grid" aria-live="polite"></section>
</div>

<script src="/testers.js"></script>
</body>
</html>
